version: '3.8'
services:
  db:
    image: postgres:15
    container_name: nevumo_db
    restart: always
    environment:
      POSTGRES_USER: nevumo_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: nevumo_leads
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: