services:
  postgres:
    image: postgres:15
    container_name: nevumo-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - nevumo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nevumo-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - nevumo_redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nevumo-api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - PYTHONPATH=/workspace
      - DATABASE_URL=postgresql://nevumo:nevumo@nevumo-postgres:5432/nevumo_leads
      - REDIS_HOST=nevumo-redis
    working_dir: /workspace/apps/api
    volumes:
      - ./:/workspace
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nevumo-web
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://nevumo-api:8000
    working_dir: /workspace/apps/web
    volumes:
      - ./:/workspace
      - /workspace/node_modules
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  nevumo_pgdata:
  nevumo_redisdata:
